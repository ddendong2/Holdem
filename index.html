<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NL 홀덤 토너먼트</title>
<style>
  html, body, #root { height: 100%; margin: 0; }
  * { box-sizing: border-box; }
  body { background:#0c0f0d; color:#ece6d8; font-family: Georgia, 'Apple SD Gothic Neo', serif; }
  #boot-error { display:none; padding:40px 24px; max-width:560px; margin:0 auto; line-height:1.75; font-size:14px; }
  #boot-error h2 { color:#d4af37; }
  #boot-error code { background:#1a1d19; padding:2px 6px; border-radius:4px; font-size:13px; color:#f3e3a3; }
  #boot-error pre { background:#1a1d19; padding:12px; border-radius:8px; overflow-x:auto; font-size:12px; color:#d9534f; white-space:pre-wrap; }
  @keyframes pulseRed { 0%,100% { opacity:1; } 50% { opacity:0.45; } }
  @keyframes popIn { 0% { transform:scale(0.6); opacity:0; } 100% { transform:scale(1); opacity:1; } }
  @keyframes glow { 0%,100% { box-shadow:0 0 10px rgba(212,175,55,0.5); } 50% { box-shadow:0 0 22px rgba(212,175,55,0.95); } }
  @keyframes spinSlow { from { transform: translate(-50%,-50%) rotate(0deg); } to { transform: translate(-50%,-50%) rotate(360deg); } }
  @keyframes dealIn {
    0%   { transform: translate(0,-70px) rotate(480deg) scale(0.25); opacity: 0; }
    55%  { opacity: 1; }
    100% { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }
  }
  @keyframes flipIn {
    0%   { transform: perspective(500px) rotateY(92deg) scale(0.85); opacity: 0.3; }
    100% { transform: perspective(500px) rotateY(0deg) scale(1); opacity: 1; }
  }
</style>
</head>
<body>
<div id="root"></div>
<div id="boot-error"></div>

<!-- ⬇️ 설정 파일. 이 파일(firebase-config.js)만 수정하면 됩니다. -->
<script src="firebase-config.js"></script>

<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
/* ===== 아래는 수정할 필요 없습니다 ===== */
var db = null;
function showBootError(html) {
  var el = document.getElementById("boot-error");
  el.innerHTML = html; el.style.display = "block";
}
(function initFirebase() {
  try {
    var cfg = window.FIREBASE_CONFIG || window.firebaseConfig || null;
    if (!window.firebase) {
      showBootError("<h2>⚠️ Firebase 스크립트 로드 실패</h2><p>인터넷 연결 또는 <code>gstatic.com</code> 차단 여부를 확인해주세요.</p>");
      return;
    }
    if (!cfg) {
      showBootError("<h2>⚙️ 설정 파일을 찾을 수 없습니다</h2><p><code>firebase-config.js</code> 가 <code>index.html</code> 과 같은 폴더에 있는지 확인해주세요.</p>");
      return;
    }
    var missing = [];
    ["apiKey","authDomain","databaseURL","projectId","appId"].forEach(function (k) {
      var v = cfg[k];
      if (!v || String(v).indexOf("여기에") === 0 || String(v).indexOf("YOUR_") === 0) missing.push(k);
    });
    if (missing.length) {
      showBootError(
        "<h2>⚙️ Firebase 설정이 필요합니다</h2>" +
        "<p><code>firebase-config.js</code> 에서 아래 항목을 아직 채우지 않으셨습니다:</p>" +
        "<pre>" + missing.join("\n") + "</pre>" +
        "<p>Firebase 콘솔 → 프로젝트 설정(⚙️) → 내 앱 → 웹앱 에서 값을 옮겨 적으세요.<br>" +
        "※ <code>import</code> 나 <code>initializeApp</code> 같은 코드는 넣지 말고 <b>값만</b> 넣으세요.</p>"
      );
      return;
    }
    firebase.initializeApp(cfg);
    db = firebase.database();
  } catch (e) {
    showBootError("<h2>⚠️ Firebase 초기화 오류</h2><p><code>databaseURL</code> 등 값이 올바른지 확인해주세요.</p><pre>" + (e.message || e) + "</pre>");
  }
})();
</script>

<script type="text/babel" data-presets="react">
/* =========================================================================
   NL 홀덤 토너먼트 v4
   - 개인 족보 실시간 표시 (본인에게만)
   - 타원형 테이블 · 시계방향 좌석 배치
   - 준비 기반 자동 시작 로비 (+뒤로가기)
   - 홀덤 설명 카드뉴스 5장
   ========================================================================= */
var useState = React.useState;
var useEffect = React.useEffect;
var useRef = React.useRef;

var STARTING_STACK = 30000;
var MAX_PLAYERS = 9;
var LEVEL_SECONDS = 5 * 60;
var TURN_SECONDS = 10;
var RUNOUT_MS = 1800;
var HANDOVER_SHOWDOWN_MS = 7000;
var HANDOVER_QUICK_MS = 2800;
var BACKUP_DELAY_MS = 3000;
var AUTOSTART_DELAY_MS = 1500;
var ROOM_PATH = "holdem_tourney";
var ID_KEY = "holdem_identity";

function blindsForLevel(i) {
  var g = Math.floor(i / 5), p = i % 5;
  var sb = (p + 1) * 100 * Math.pow(10, g);
  return { sb: sb, bb: sb * 2 };
}
function currentLevelIdx(startAt) {
  if (!startAt) return 0;
  return Math.floor(Math.max(0, (Date.now() - startAt) / 1000) / LEVEL_SECONDS);
}
function secsToNextLevel(startAt) {
  if (!startAt) return LEVEL_SECONDS;
  var el = Math.max(0, (Date.now() - startAt) / 1000);
  return Math.ceil(LEVEL_SECONDS - (el % LEVEL_SECONDS));
}
function pad2(n) { var s = String(n); return s.length < 2 ? "0" + s : s; }

var SUITS = ["s", "h", "d", "c"];
var SUIT_GLYPH = { s: "♠", h: "♥", d: "♦", c: "♣" };
var SUIT_COLOR = { s: "#101010", c: "#101010", h: "#c62828", d: "#c62828" };
var RANK_TXT = { 11: "J", 12: "Q", 13: "K", 14: "A" };
function rankLabel(r) { return RANK_TXT[r] || String(r); }

function freshDeck() {
  var d = [];
  for (var si = 0; si < SUITS.length; si++) for (var r = 2; r <= 14; r++) d.push([r, SUITS[si]]);
  for (var i = d.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = d[i]; d[i] = d[j]; d[j] = t; }
  return d;
}

function evaluate5(cards) {
  var ranks = cards.map(function (c) { return c[0]; }).sort(function (a, b) { return b - a; });
  var suits = cards.map(function (c) { return c[1]; });
  var isFlush = suits.every(function (s) { return s === suits[0]; });
  var counts = {};
  ranks.forEach(function (r) { counts[r] = (counts[r] || 0) + 1; });
  var byCount = Object.keys(counts).map(function (r) { return [Number(r), counts[r]]; })
    .sort(function (a, b) { return (b[1] - a[1]) || (b[0] - a[0]); });
  var uniq = ranks.filter(function (v, i, arr) { return arr.indexOf(v) === i; });
  var sh = 0;
  if (uniq.length === 5) {
    if (uniq[0] - uniq[4] === 4) sh = uniq[0];
    else if (uniq.join(",") === "14,5,4,3,2") sh = 5;
  }
  if (sh && isFlush) return [8, sh];
  if (byCount[0][1] === 4) return [7, byCount[0][0], byCount[1][0]];
  if (byCount[0][1] === 3 && byCount[1][1] === 2) return [6, byCount[0][0], byCount[1][0]];
  if (isFlush) return [5].concat(ranks);
  if (sh) return [4, sh];
  if (byCount[0][1] === 3) return [3, byCount[0][0]].concat(byCount.slice(1).map(function (x) { return x[0]; }));
  if (byCount[0][1] === 2 && byCount[1][1] === 2) {
    var pr = [byCount[0][0], byCount[1][0]].sort(function (a, b) { return b - a; });
    return [2, pr[0], pr[1], byCount[2][0]];
  }
  if (byCount[0][1] === 2) return [1, byCount[0][0]].concat(byCount.slice(1).map(function (x) { return x[0]; }));
  return [0].concat(ranks);
}
function cmpScore(a, b) {
  var L = Math.max(a.length, b.length);
  for (var i = 0; i < L; i++) { var x = a[i] || 0, y = b[i] || 0; if (x !== y) return x - y; }
  return 0;
}
function best7(c7) {
  var best = null, n = c7.length;
  for (var a = 0; a < n; a++) for (var b = a+1; b < n; b++) for (var c = b+1; c < n; c++)
    for (var d = c+1; d < n; d++) for (var e = d+1; e < n; e++) {
      var five = [c7[a], c7[b], c7[c], c7[d], c7[e]];
      var sc = evaluate5(five);
      if (!best || cmpScore(sc, best.score) > 0) best = { score: sc, five: five };
    }
  return best;
}
var HAND_NAMES = ["하이카드","원페어","투페어","트리플","스트레이트","플러시","풀하우스","포카드","스트레이트 플러시"];

/* ========== 효과음 (Web Audio 합성 — 외부 파일 불필요) ========== */
var SFX = (function () {
  var ctx = null;
  var muted = false;
  try { muted = localStorage.getItem("holdem_muted") === "1"; } catch (e) {}

  function ac() {
    if (!ctx) {
      try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return null; }
    }
    if (ctx && ctx.state === "suspended") ctx.resume();
    return ctx;
  }
  function tone(freq, type, dur, vol, when, slideTo) {
    var c = ac(); if (!c || muted) return;
    var t0 = c.currentTime + (when || 0);
    var o = c.createOscillator(), g = c.createGain();
    o.type = type || "sine";
    o.frequency.setValueAtTime(freq, t0);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t0 + dur);
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(vol || 0.12, t0 + 0.006);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g); g.connect(c.destination);
    o.start(t0); o.stop(t0 + dur + 0.05);
  }
  function noise(dur, vol, when, hpFreq) {
    var c = ac(); if (!c || muted) return;
    var t0 = c.currentTime + (when || 0);
    var len = Math.max(1, Math.floor(c.sampleRate * dur));
    var buf = c.createBuffer(1, len, c.sampleRate);
    var data = buf.getChannelData(0);
    for (var i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / len);
    var src = c.createBufferSource(); src.buffer = buf;
    var f = c.createBiquadFilter(); f.type = "highpass"; f.frequency.value = hpFreq || 1200;
    var g = c.createGain(); g.gain.setValueAtTime(vol || 0.1, t0);
    src.connect(f); f.connect(g); g.connect(c.destination);
    src.start(t0);
  }
  return {
    unlock: function () { ac(); },
    isMuted: function () { return muted; },
    setMuted: function (m) { muted = m; try { localStorage.setItem("holdem_muted", m ? "1" : "0"); } catch (e) {} },
    deal:   function (when) { noise(0.06, 0.11, when, 2400); },                              // 카드 스냅
    flip:   function (when) { noise(0.05, 0.09, when, 1500); tone(920, "triangle", 0.09, 0.06, when); },
    chip:   function () { tone(2300, "square", 0.03, 0.05, 0); tone(1750, "square", 0.035, 0.05, 0.055); }, // 칩 부딪힘
    check:  function () { tone(210, "sine", 0.055, 0.13, 0); tone(170, "sine", 0.055, 0.11, 0.09); },       // 테이블 노크
    fold:   function () { noise(0.13, 0.06, 0, 700); },
    myTurn: function () { tone(660, "sine", 0.1, 0.1, 0); tone(990, "sine", 0.13, 0.08, 0.1); },
    tick:   function () { tone(1250, "square", 0.045, 0.06, 0); },
    allin:  function () { tone(180, "sawtooth", 0.55, 0.1, 0, 760); noise(0.3, 0.05, 0.1, 900); },
    win:    function () { [523, 659, 784, 1047].forEach(function (fr, i) { tone(fr, "triangle", 0.2, 0.1, i * 0.12); }); },
    levelup:function () { tone(784, "sine", 0.16, 0.1, 0); tone(1047, "sine", 0.26, 0.1, 0.16); }
  };
})();

/* [1] 본인 전용 실시간 족보 계산 (DB에 저장하지 않음 → 남에게 안 보임) */
function myHandLabel(holeCards, community) {
  if (!holeCards || holeCards.length < 2) return null;
  var all = holeCards.concat(community || []);
  if (all.length < 5) {
    if (holeCards[0][0] === holeCards[1][0]) return "원페어 (" + rankLabel(holeCards[0][0]) + ")";
    var hi = Math.max(holeCards[0][0], holeCards[1][0]);
    return "하이카드 (" + rankLabel(hi) + ")";
  }
  var b = best7(all);
  return HAND_NAMES[b.score[0]] + " (" + rankLabel(b.score[1]) + ")";
}

function findBySeat(st, s) { for (var k = 0; k < st.players.length; k++) if (st.players[k].seat === s) return st.players[k]; return null; }
function findById(st, id) { for (var k = 0; k < st.players.length; k++) if (st.players[k].id === id) return st.players[k]; return null; }
function inHandPlayers(st) { return st.players.filter(function (p) { return p.status === "active" || p.status === "allin"; }); }
function eligibleActors(st) { return st.players.filter(function (p) { return p.status === "active"; }); }
function alivePlayers(st) { return st.players.filter(function (p) { return p.status !== "out"; }); }

function nextSeat(st, fromSeat, opts) {
  opts = opts || {};
  var n = st.players.length, s = fromSeat;
  for (var i = 0; i < n; i++) {
    s = (s + 1) % n;
    var p = findBySeat(st, s);
    if (!p || p.status === "out") continue;
    if (opts.actableOnly && p.status !== "active") continue;
    return p;
  }
  return null;
}
function setTurn(st, id) {
  st.currentTurnId = id || null;
  st.turnDeadline = id ? (Date.now() + TURN_SECONDS * 1000) : null;
}

function bettingRoundComplete(st) {
  if (inHandPlayers(st).length <= 1) return true;
  var actors = eligibleActors(st);
  if (actors.length === 0) return true;
  return actors.every(function (p) { return p.hasActed && p.betThisRound === st.currentBet; });
}
function resetRoundFlags(st) {
  st.players.forEach(function (p) { p.betThisRound = 0; p.hasActed = false; });
  st.currentBet = 0; st.minRaise = st.bb; st.lastAggressorId = null;
}
function dealStreet(st) {
  if (st.stage === "preflop") { st.deck.pop(); st.community.push(st.deck.pop(), st.deck.pop(), st.deck.pop()); st.stage = "flop"; }
  else if (st.stage === "flop") { st.deck.pop(); st.community.push(st.deck.pop()); st.stage = "turn"; }
  else if (st.stage === "turn") { st.deck.pop(); st.community.push(st.deck.pop()); st.stage = "river"; }
}
function buildSidePots(st) {
  var contrib = st.players.filter(function (p) { return p.totalBetThisHand > 0; });
  var set = {}; contrib.forEach(function (p) { set[p.totalBetThisHand] = true; });
  var levels = Object.keys(set).map(Number).sort(function (a, b) { return a - b; });
  var pots = [], prev = 0;
  levels.forEach(function (lv) {
    var layer = contrib.filter(function (p) { return p.totalBetThisHand >= lv; });
    var amt = (lv - prev) * layer.length;
    if (amt > 0) pots.push({
      amount: amt,
      eligiblePlayerIds: st.players.filter(function (p) {
        return p.totalBetThisHand >= lv && (p.status === "active" || p.status === "allin");
      }).map(function (p) { return p.id; })
    });
    prev = lv;
  });
  return pots;
}

function resolveShowdown(st) {
  var inHand = inHandPlayers(st);
  st.log.unshift("--- 쇼다운 ---");
  var res = {};
  inHand.forEach(function (p) { res[p.id] = best7(p.cards.concat(st.community)); });

  var winnerSet = {};
  var pots = buildSidePots(st);
  pots.forEach(function (pot, idx) {
    var elig = pot.eligiblePlayerIds.filter(function (id) { return res[id]; });
    if (!elig.length) return;
    var bs = null;
    elig.forEach(function (id) { if (!bs || cmpScore(res[id].score, bs) > 0) bs = res[id].score; });
    var wins = elig.filter(function (id) { return cmpScore(res[id].score, bs) === 0; });
    var share = Math.floor(pot.amount / wins.length);
    var rem = pot.amount - share * wins.length;
    wins.forEach(function (id, i) { findById(st, id).stack += share + (i < rem ? 1 : 0); winnerSet[id] = true; });
    var label = pots.length > 1 ? ("사이드팟" + (idx + 1)) : "팟";
    var names = wins.map(function (id) { return findById(st, id).name; }).join(", ");
    st.log.unshift(label + " " + pot.amount.toLocaleString() + " → " + names + " (" + HAND_NAMES[bs[0]] + ")");
  });

  st.revealCards = true;
  st.winnerIds = Object.keys(winnerSet);
  st.handNames = {};
  inHand.forEach(function (p) {
    st.handNames[p.id] = HAND_NAMES[res[p.id].score[0]];
    var txt = p.cards.map(function (c) { return rankLabel(c[0]) + SUIT_GLYPH[c[1]]; }).join(" ");
    st.log.unshift(p.name + ": " + txt + " — " + st.handNames[p.id]);
  });

  endHandCleanup(st, HANDOVER_SHOWDOWN_MS);
}

function awardUncontested(st) {
  var w = inHandPlayers(st)[0];
  var total = st.players.reduce(function (s, p) { return s + p.totalBetThisHand; }, 0);
  if (w) {
    w.stack += total;
    st.winnerIds = [w.id];
    st.log.unshift(w.name + "님이 " + total.toLocaleString() + " 획득 (모두 폴드)");
  }
  st.revealCards = false;
  endHandCleanup(st, HANDOVER_QUICK_MS);
}

function endHandCleanup(st, delayMs) {
  st.runout = false;
  st.nextStreetAt = null;
  st.players.forEach(function (p) {
    if (p.stack <= 0 && p.status !== "out" && p.status !== "waiting") {
      p.status = "out";
      p.finishRank = alivePlayers(st).length + 1;
      st.log.unshift(p.name + "님 칩 소진 — " + p.finishRank + "위로 탈락");
    }
  });
  var remain = alivePlayers(st);
  st.stage = "handover";
  setTurn(st, null);
  st.handoverAt = Date.now();
  st.handoverDelay = delayMs || HANDOVER_QUICK_MS;
  if (remain.length <= 1) {
    st.stage = "gameover";
    if (remain.length === 1) { remain[0].finishRank = 1; st.log.unshift("🏆 " + remain[0].name + "님 우승!"); }
  }
  st.log = st.log.slice(0, 60);
}

function advanceState(st) {
  if (inHandPlayers(st).length <= 1) { awardUncontested(st); return st; }

  if (!bettingRoundComplete(st)) {
    var cur = findById(st, st.currentTurnId);
    var nxt = nextSeat(st, cur ? cur.seat : -1, { actableOnly: true });
    setTurn(st, nxt ? nxt.id : null);
    return st;
  }

  resetRoundFlags(st);

  if (st.stage === "river") { resolveShowdown(st); return st; }

  if (eligibleActors(st).length < 2) {
    st.runout = true;
    st.revealCards = true;
    setTurn(st, null);
    st.nextStreetAt = Date.now() + RUNOUT_MS;
    st.log.unshift("🔥 올인 — 카드를 오픈하고 리버까지 진행합니다");
    st.log = st.log.slice(0, 60);
    return st;
  }

  dealStreet(st);
  /* 플랍/턴/리버는 SB부터 액션 (SB가 액션 불가면 그 다음 사람) */
  var sbP = findBySeat(st, st.sbSeat);
  var first = (sbP && sbP.status === "active") ? sbP : nextSeat(st, st.sbSeat, { actableOnly: true });
  setTurn(st, first ? first.id : null);
  return st;
}

function progressRunout(st) {
  if (st.stage === "river") { resolveShowdown(st); return st; }
  dealStreet(st);
  st.nextStreetAt = Date.now() + RUNOUT_MS;
  return st;
}

function surrender(st, pid) {
  var p = findById(st, pid);
  if (!p || p.status === "out") return null;

  var aliveBefore = alivePlayers(st).length;
  var wasTurn = st.currentTurnId === pid;
  var midHand = (st.stage === "preflop" || st.stage === "flop" || st.stage === "turn" || st.stage === "river");

  p.status = "out";
  p.stack = 0;
  p.finishRank = aliveBefore;
  st.log.unshift("🏳️ " + p.name + "님 항복 — " + aliveBefore + "위로 종료");

  var aliveAfter = aliveBefore - 1;

  if (aliveAfter <= 1) {
    var w = alivePlayers(st)[0];
    if (w) {
      var potLeft = st.players.reduce(function (s, x) { return s + (x.totalBetThisHand || 0); }, 0);
      if (potLeft > 0 && midHand) w.stack += potLeft;
      w.finishRank = 1;
      st.log.unshift("🏆 " + w.name + "님 우승!");
    }
    st.stage = "gameover";

function startHand(st) {

  st.handoverAt = null;

  var lg = ["====== 핸드 #" + st.handNumber + " (L" + (lvl+1) + ": " + bl.sb.toLocaleString() + "/" + bl.bb.toLocaleString() + ") ======"].concat(st.log || []);

  for (var i = 0; i < n; i++) {

  }

  function post(pl, amt) {
    var real = Math.min(amt, pl.stack);
    pl.stack -= real; pl.betThisRound = real; pl.totalBetThisHand = real;
    if (pl.stack === 0) pl.status = "allin";

  if (order.length === 2) { sbP = dealer; bbP = order[0]; first = dealer; }

  post(sbP, bl.sb);
  post(bbP, bl.bb);
  st.sbSeat = sbP.seat;
  st.bbSeat = bbP.seat;

  order.forEach(function (pl) { pl.cards = [st.deck.pop(), st.deck.pop()]; });

  st.currentBet = bl.bb;
  st.minRaise = bl.bb;
  st.lastAggressorId = bbP.id;
  st.stage = "preflop";

  if (first && first.status === "active") setTurn(st, first.id);
  else { setTurn(st, null); advanceState(st); }
  return st;
}

function applyAction(cur, pid, type, amount) {
  var p = findById(cur, pid);
  if (!p || p.status !== "active") return null;

  if (type === "fold") {
    p.status = "folded"; p.hasActed = true;
    cur.log.unshift(p.name + ": 폴드");
  } else if (type === "check") {
    if (p.betThisRound !== cur.currentBet) return null;
    p.hasActed = true;
    cur.log.unshift(p.name + ": 체크");
  } else if (type === "call") {
    var toCall = Math.min(cur.currentBet - p.betThisRound, p.stack);
    p.stack -= toCall; p.betThisRound += toCall; p.totalBetThisHand += toCall;
    p.hasActed = true;
    if (p.stack === 0) p.status = "allin";
    cur.log.unshift(p.name + ": 콜 (" + p.betThisRound.toLocaleString() + ")");
  } else if (type === "raise" || type === "allin") {
    var target = (type === "allin") ? (p.betThisRound + p.stack) : amount;
    target = Math.min(target, p.betThisRound + p.stack);
    var rs = target - cur.currentBet;
    var add = target - p.betThisRound;
    if (add <= 0) return null;
    p.stack -= add; p.betThisRound = target; p.totalBetThisHand += add;
    p.hasActed = true;
    if (p.stack === 0) p.status = "allin";
    var isRaise = target > cur.currentBet;
    if (isRaise) {
      cur.minRaise = Math.max(rs, cur.minRaise);
      cur.currentBet = target;
      cur.lastAggressorId = p.id;
      cur.players.forEach(function (o) { if (o.id !== p.id && o.status === "active") o.hasActed = false; });
    }
    cur.log.unshift(p.name + ": " + (p.status === "allin" ? "올인" : (isRaise ? "레이즈" : "콜")) + " (" + target.toLocaleString() + ")");
  } else return null;

  cur.log = cur.log.slice(0, 60);
  return advanceState(cur);
}

function primaryDriverId(r) {
  var alive = r.players.filter(function (p) { return p.status !== "out"; })
    .sort(function (a, b) { return a.seat - b.seat; });
  return alive.length ? alive[0].id : null;
}

    var alive = alivePlayers(r).length;
    var msg = alive <= 2
      ? "항복하시겠습니까?\n상대방이 우승자가 되고 토너먼트가 종료됩니다."
      : "항복하시겠습니까?\n지금 순위(" + alive + "위)로 게임에서 나가게 됩니다.";
    if (!confirm(msg)) return;
    freshRoomRead().then(function (cur) {
      if (!cur || !me) return;
      var nx = surrender(cur, me.id);
      if (nx) return saveRoom(nx);
    });
  }
  function newTournament() {
    if (!confirm("새 토너먼트를 준비할까요?\n(이전 결과가 사라지고 로비로 돌아갑니다)")) return;
    saveRoom(emptyRoom()).then(function () {
      localStorage.removeItem(ID_KEY); setMe(null); setNameInput(""); setScreen("main");
    });
  }
  function doAction(type, amount) {
    freshRoomRead().then(function (cur) {
      if (!cur || !me || cur.currentTurnId !== me.id) return;
      var nx = applyAction(cur, me.id, type, amount);
      setRaiseInput("");
      if (nx) return saveRoom(nx);
    });
  }

  if (!db) return null;
  if (connError) {
    return (
      <div style={S.wrap}><div style={S.center}>
        <div style={S.logo}>⚠️ 연결 오류</div>
        <p style={S.subtle}>{connError}</p>
        <p style={S.tiny}>Firebase 콘솔 &gt; Realtime Database &gt; 규칙 에서 아래처럼 설정 후 "게시":</p>
        <pre style={S.pre}>{'{\n  "rules": {\n    ".read": true,\n    ".write": true\n  }\n}'}</pre>
      </div></div>
    );
  }
  if (loading) return <div style={S.wrap}><div style={S.center}>불러오는 중…</div></div>;

  var r = room || emptyRoom();
  var meP = me ? findById(r, me.id) : null;

  var liveLvl = r.tournamentStartAt ? currentLevelIdx(r.tournamentStartAt) : 0;
  var liveBlinds = blindsForLevel(liveLvl);
  var nextBlinds = blindsForLevel(liveLvl + 1);
  var remain = r.tournamentStartAt ? secsToNextLevel(r.tournamentStartAt) : LEVEL_SECONDS;

  /* ========== [4] 홀덤 설명 카드뉴스 ========== */
  if (!meP && screen === "guide") {
    var slide = GUIDE_SLIDES[guideIdx];
    var isLast = guideIdx === GUIDE_SLIDES.length - 1;
    return (
      <div style={S.wrap}><div style={S.center}>
        <div style={S.guideCard}>
          <div style={S.guideIcon}>{slide.icon}</div>
          <div style={S.guideTitle}>{slide.title}</div>
          <div style={S.guideBody}>
            {slide.lines.map(function (ln, i) {
              return ln === ""
                ? <div key={i} style={{ height: 10 }} />
                : <div key={i} style={S.guideLine}>{ln}</div>;
            })}
          </div>
          <div style={S.guideDots}>
            {GUIDE_SLIDES.map(function (_, i) {
              return <span key={i} style={Object.assign({}, S.dot, i === guideIdx ? S.dotOn : {})} />;
            })}
          </div>
        </div>
        <div style={S.guideNav}>
          <button style={Object.assign({}, S.btnGhostHalf, { visibility: guideIdx > 0 ? "visible" : "hidden" })}
            onClick={function () { setGuideIdx(guideIdx - 1); }}>← 이전</button>
          {isLast ? (
            <button style={S.btnGoldHalf} onClick={function () { setGuideIdx(0); setScreen("main"); }}>처음으로 ✓</button>
          ) : (
            <button style={S.btnGoldHalf} onClick={function () { setGuideIdx(guideIdx + 1); }}>다음 →</button>
          )}
        </div>
        <p style={S.tiny}>{guideIdx + 1} / {GUIDE_SLIDES.length}</p>
      </div></div>
    );
  }

  /* ========== 첫 화면 (입장) ========== */
  if (!meP) {
    var joinable = r.stage !== "gameover" && alivePlayers(r).length < MAX_PLAYERS;
    return (
      <div style={S.wrap}><div style={S.center}>
        <div style={S.logo}>♠ NL 홀덤 토너먼트 ♣</div>
        {joinable ? (
          <React.Fragment>
            <p style={S.subtle}>{r.stage === "lobby" ? "닉네임을 입력하고 테이블에 앉으세요" : "🪑 진행 중 — 중간 참여 가능"}</p>
            <input style={S.input} placeholder="닉네임" value={nameInput} maxLength={10}
              onChange={function (ev) { setNameInput(ev.target.value); }}
              onKeyDown={function (ev) { if (ev.key === "Enter") joinTable(); }} />
            <button style={S.btnGold} onClick={joinTable}>테이블 입장</button>
            <button style={S.btnGhost} onClick={function () { setGuideIdx(0); setScreen("guide"); }}>📖 홀덤 설명</button>
            {r.stage !== "lobby" && (
              <p style={S.tiny}>현재 레벨 {liveLvl + 1} ({liveBlinds.sb.toLocaleString()}/{liveBlinds.bb.toLocaleString()}) · 다음 핸드부터 플레이</p>
            )}
          </React.Fragment>
        ) : (
          <React.Fragment>
            <p style={S.subtle}>{r.stage === "gameover" ? "토너먼트가 종료되었습니다." : "정원이 가득 찼습니다."}</p>
            <button style={S.btnGhost} onClick={function () { setGuideIdx(0); setScreen("guide"); }}>📖 홀덤 설명</button>
          </React.Fragment>
        )}
        <p style={S.tiny}>시작칩 {STARTING_STACK.toLocaleString()} · 최대 {MAX_PLAYERS}명 · 레벨 5분 · 액션 {TURN_SECONDS}초</p>
      </div></div>
    );
  }

  /* ========== [3] 로비 (준비 기반 자동 시작) ========== */
  if (r.stage === "lobby") {
    var readyCount = r.players.filter(function (p) { return p.ready; }).length;
    var allReady = r.players.length >= 2 && readyCount === r.players.length;
    return (
      <div style={S.wrap}><div style={S.center}>
        <div style={S.lobbyTopRow}>
          <button style={S.btnBack} onClick={leaveLobby}>← 나가기</button>
          <span style={S.tiny}>{readyCount}/{r.players.length} 준비</span>
        </div>
        <div style={S.logo}>♠ 대기실 ♣</div>
        <div style={S.lobbyList}>
          {r.players.map(function (p) {
            var mine = p.id === me.id;
            return (
              <div key={p.id} style={S.lobbyRow}>
                <span style={mine ? { color: "#f3e3a3", fontWeight: 700 } : {}}>
                  {p.name}{mine ? " (나)" : ""}
                </span>
                {p.ready
                  ? <span style={S.readyOn}>✅ 준비완료</span>
                  : <span style={S.readyOff}>⏳ 대기중</span>}
              </div>
            );
          })}
        </div>

        <button
          style={meP.ready ? S.btnReadyOn : S.btnGold}
          onClick={toggleReady}>
          {meP.ready ? "✅ 준비완료 (누르면 취소)" : "준비하기"}
        </button>

        {allReady
          ? <p style={S.autoStartHot}>🎉 전원 준비 완료 — 곧 시작합니다!</p>
          : <p style={S.tiny}>모든 플레이어가 준비 완료되면 자동으로 시작됩니다 (최소 2명)</p>}
      </div></div>
    );
  }

  /* ========== 종료 ========== */
  if (r.stage === "gameover") {
    var ranked = r.players.slice().sort(function (x, y) { return (x.finishRank || 99) - (y.finishRank || 99); });
    return (
      <div style={S.wrap}><div style={S.center}>
        <div style={S.logo}>🏆 토너먼트 종료</div>
        <p style={Object.assign({}, S.subtle, { fontSize: 22 })}>{ranked[0] ? ranked[0].name + "님 우승!" : "게임 종료"}</p>
        <div style={S.lobbyList}>
          {ranked.map(function (p) {
            return (
              <div key={p.id} style={S.lobbyRow}>
                <span>{(p.finishRank ? p.finishRank + "위 " : "- ") + p.name}</span>
                <span style={S.tiny}>{p.stack.toLocaleString()}</span>
              </div>
            );
          })}
        </div>
        <button style={S.btnGold} onClick={newTournament}>새 토너먼트</button>
      </div></div>
    );
  }

  /* ========== [2] 게임 테이블 (타원형 · 시계방향) ========== */
  var isMyTurn = r.currentTurnId === me.id && meP.status === "active";
  var toCall = Math.max(0, (r.currentBet || 0) - (meP.betThisRound || 0));
  var canCheck = toCall === 0;
  var minRaiseTotal = (r.currentBet || 0) + (r.minRaise || r.bb);
  var myMax = meP.betThisRound + meP.stack;
  var pot = r.players.reduce(function (s, p) { return s + (p.totalBetThisHand || 0); }, 0);
  var aliveCount = alivePlayers(r).length;
  var turnLeft = r.turnDeadline ? Math.max(0, Math.ceil((r.turnDeadline - Date.now()) / 1000)) : 0;
  var nextHandIn = (r.stage === "handover" && r.handoverAt)
    ? Math.max(0, Math.ceil((r.handoverAt + r.handoverDelay - Date.now()) / 1000)) : 0;

  var seats = r.players.slice().sort(function (x, y) { return x.seat - y.seat; });
  var mi = 0;
  for (var k = 0; k < seats.length; k++) if (seats[k].id === me.id) { mi = k; break; }
  var rotated = seats.slice(mi).concat(seats.slice(0, mi)); // [0] = 나 (하단 중앙), 이후 시계방향

  var levelUpPending = liveLvl > r.level;
  var stageTxt = { preflop: "프리플롭", flop: "플랍", turn: "턴", river: "리버", handover: "핸드 종료" }[r.stage] || "";
  if (r.runout) stageTxt = stageTxt + " · 올인 오픈";

  function shouldReveal(p) {
    if (p.id === me.id) return true;
    if (!r.revealCards) return false;
    return p.status !== "folded" && p.status !== "waiting" && (p.cards || []).length > 0;
  }

  /* [1] 본인 족보 (로컬 계산 — DB에 저장 안 하므로 남에게 안 보임) */
  var privateLabel = (meP.status !== "folded" && meP.status !== "out" && meP.status !== "waiting")
    ? myHandLabel(meP.cards, r.community) : null;

  /* 타원 위 좌석 좌표 (i=0 하단 중앙, 시계방향으로 배치) */
  function seatPos(i, n) {
    var ang = (90 + (360 / n) * i) * Math.PI / 180;
    return {
      left: (50 + 40 * Math.cos(ang)) + "%",
      top: (50 + 37 * Math.sin(ang)) + "%"
    };
  }

  function potBetTarget(pct) {
    var potAfterCall = pot + toCall;
    var raw = r.currentBet + potAfterCall * pct;
    var rounded = Math.round(raw / 100) * 100;
    return Math.min(Math.max(rounded, minRaiseTotal), myMax);
  }
  function potBtn(label, pct) {
    var t = potBetTarget(pct);
    var isAll = t >= myMax;
    return (
      <button key={label} style={S.btnPot} onClick={function () { doAction("raise", t); }}>
        <span style={{ fontWeight: 700 }}>{label}</span>
        <span style={S.btnPotSub}>{isAll ? "올인" : t.toLocaleString()}</span>
      </button>
    );
  }

  var winnerNames = (r.winnerIds || []).map(function (id) {
    var p = findById(r, id); return p ? p.name : "";
  }).filter(Boolean);

  var n = rotated.length;

  return (
    <div style={S.tableWrap}>
      <div style={S.topBar}>
        <span style={S.brand}>♠ 토너먼트</span>
        <span style={S.tiny}>핸드 #{r.handNumber} · {aliveCount}명 생존</span>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          <button style={S.btnTinyIcon} onClick={toggleMute}>{muted ? "🔇" : "🔊"}</button>
          {meP.status !== "out"
            ? <button style={S.btnSurrender} onClick={doSurrender}>🏳️ 항복</button>
            : <span style={S.tiny}>관전 중</span>}
        </div>
      </div>

      <div style={S.levelBar}>
        <div>
          <span style={S.levelBadge}>L{r.level + 1}</span>
          <span style={S.levelBlind}> {r.sb.toLocaleString()} / {r.bb.toLocaleString()}</span>
        </div>
        <div style={S.levelTimer}>
          다음 레벨 <span style={{ color: remain <= 30 ? "#d9534f" : "#f3e3a3", fontWeight: 700 }}>{pad2(Math.floor(remain/60))}:{pad2(remain%60)}</span>
        </div>
        <div style={S.tiny}>다음: {nextBlinds.sb.toLocaleString()} / {nextBlinds.bb.toLocaleString()}</div>
      </div>

      {levelUpPending && <div style={S.levelUpNotice}>📈 레벨 상승! 다음 핸드부터 {liveBlinds.sb.toLocaleString()} / {liveBlinds.bb.toLocaleString()} 적용</div>}
      {r.runout && <div style={S.runoutNotice}>🔥 올인! 리버까지 오픈합니다…</div>}

      {/* 타원형 테이블 */}
      <div style={S.tableOuter}>
        <div style={S.tableFelt}>
          {/* 시계방향 안내 링 */}
          <div style={S.directionRing} />
          <div style={S.directionArrowTop}>↻</div>
          <div style={S.directionArrowBottom}>↻</div>

          {/* 중앙: 팟 + 커뮤니티 카드 */}
          <div style={S.boardCenter}>
            <div style={S.potLabel}>POT {pot.toLocaleString()}</div>
            <div style={S.community}>
              {[0,1,2,3,4].map(function (i) {
                if (!r.community[i]) return <div key={"b" + i} style={S.cardBack} />;
                /* 플랍 3장은 순차 플립, 턴/리버는 즉시 플립 */
                var delay = i < 3 ? (i * 0.14) : 0;
                return (
                  <div key={r.handNumber + "-" + i}
                    style={{ animation: "flipIn 0.45s ease-out both", animationDelay: delay + "s" }}>
                    <Card card={r.community[i]} />
                  </div>
                );
              })}
            </div>
            <div style={S.stageLabel}>{stageTxt} <span style={S.dirHint}>· 시계방향 ↻</span></div>
          </div>

          {/* 좌석 배치 */}
          {rotated.map(function (p, i) {
            var pos = seatPos(i, n);
            return (
              <div key={p.id} style={Object.assign({ position: "absolute", transform: "translate(-50%,-50%)", zIndex: 2 }, pos)}>
                <PlayerChip p={p} r={r}
                  isTurn={r.currentTurnId === p.id} turnLeft={turnLeft}
                  reveal={shouldReveal(p)}
                  isWinner={(r.winnerIds || []).indexOf(p.id) >= 0}
                  privateLabel={p.id === me.id ? privateLabel : null}
                  dealOrder={i} />
              </div>
            );
          })}
        </div>
      </div>

      {r.stage === "handover" && aliveCount >= 2 && (
        <div style={S.handoverBar}>
          {winnerNames.length > 0 && (
            <div style={S.winnerBanner}>🏆 {winnerNames.join(", ")} 승리</div>
          )}
          <div style={S.tinyCenter}>다음 핸드 시작까지 {nextHandIn}초</div>
          <button style={S.btnGhostSm} onClick={forceNextHand}>지금 시작</button>
        </div>
      )}

      {isMyTurn && !r.runout && r.stage !== "handover" && (
        <div style={S.actionZone}>
          <div style={S.turnTimerBar}>
            <div style={Object.assign({}, S.turnTimerFill, {
              width: (turnLeft / TURN_SECONDS * 100) + "%",
              background: turnLeft <= 3 ? "#d9534f" : "#d4af37"
            })} />
          </div>
          <div style={Object.assign({}, S.turnTimerTxt, turnLeft <= 3 ? { color: "#d9534f", animation: "pulseRed 0.8s infinite" } : {})}>
            남은 시간 {turnLeft}초
          </div>

          <div style={S.actionBar}>
            <button style={S.btnAction} onClick={function () { doAction("fold"); }}>폴드</button>
            {canCheck
              ? <button style={S.btnAction} onClick={function () { doAction("check"); }}>체크</button>
              : <button style={S.btnAction} onClick={function () { doAction("call"); }}>콜 {toCall.toLocaleString()}</button>}
            <button style={S.btnAllin} onClick={function () { doAction("allin"); }}>올인 {myMax.toLocaleString()}</button>
          </div>

          <div style={S.potRow}>
            {potBtn("25%", 0.25)}
            {potBtn("50%", 0.5)}
            {potBtn("75%", 0.75)}
            {potBtn("100%", 1.0)}
          </div>

          <div style={S.customRow}>
            <input style={S.raiseInput} type="number" inputMode="numeric"
              placeholder={"직접 입력 (최소 " + minRaiseTotal.toLocaleString() + ")"}
              value={raiseInput} onChange={function (ev) { setRaiseInput(ev.target.value); }} />
            <button style={S.btnAction} onClick={function () { doAction("raise", Math.max(Number(raiseInput) || 0, minRaiseTotal)); }}>레이즈</button>
          </div>
        </div>
      )}

      {r.runout && <div style={S.waitBar}>카드를 오픈하는 중…</div>}
      {!isMyTurn && !r.runout && meP.status === "active" && r.stage !== "handover" && <div style={S.waitBar}>다른 플레이어의 차례입니다…</div>}
      {meP.status === "waiting" && <div style={S.waitBar}>🪑 다음 핸드부터 참가합니다</div>}
      {meP.status === "folded" && r.stage !== "handover" && <div style={S.waitBar}>이번 핸드는 폴드했습니다</div>}
      {meP.status === "allin" && !r.runout && r.stage !== "handover" && <div style={S.waitBar}>올인 상태입니다</div>}
      {meP.status === "out" && <div style={S.waitBar}>{meP.finishRank ? meP.finishRank + "위로 종료" : "탈락"} — 관전 중</div>}

      <div style={S.log}>
        {(r.log || []).slice(0, 12).map(function (line, i) {
          return <div key={i} style={S.logLine}>{line}</div>;
        })}
      </div>
    </div>
  );
}

function Card(props) {
  var rank = props.card[0], suit = props.card[1];
  var base = props.small ? S.cardSm : S.card;
  return (
    <div style={Object.assign({}, base, { color: SUIT_COLOR[suit] }, props.win ? S.cardWin : {})}>
      <div>{rankLabel(rank)}</div>
      <div style={{ fontSize: props.small ? 12 : 18, lineHeight: 1 }}>{SUIT_GLYPH[suit]}</div>
    </div>
  );
}

function PlayerChip(props) {
  var p = props.p, r = props.r;
  if (!p) return <div />;
  var folded = p.status === "folded";
  var out = p.status === "out";
  var waiting = p.status === "waiting";
  var win = props.isWinner;

  var style = Object.assign({}, S.playerCard, {
    borderColor: win ? "#d4af37" : (props.isTurn ? "#d4af37" : "#3a3f3a"),
    opacity: out ? 0.4 : ((folded || waiting) ? 0.55 : 1),
    boxShadow: props.isTurn ? "0 0 14px rgba(212,175,55,0.55)" : "0 2px 8px rgba(0,0,0,0.5)"
  });
  if (win) style.animation = "glow 1.2s ease-in-out infinite";

  var handName = r.handNames && r.handNames[p.id];

  return (
    <div style={style}>
      {win && <div style={S.winBadge}>🏆 WINNER</div>}
      <div style={S.playerNameRow}>
        {p.seat === r.dealerSeat && <span style={S.dealerBtn}>D</span>}
        {p.seat === r.sbSeat && <span style={Object.assign({}, S.posBadge, { background: "#5b8f6f", color: "#0c1a12" })}>SB</span>}
        {p.seat === r.bbSeat && <span style={Object.assign({}, S.posBadge, { background: "#3f6fa8", color: "#f0f6ff" })}>BB</span>}
        <span style={S.playerName}>{p.name}</span>
      </div>
      <div style={S.playerStack}>{p.stack.toLocaleString()}</div>

      {props.isTurn && (
        <div style={Object.assign({}, S.turnCount, props.turnLeft <= 3 ? { color: "#d9534f" } : {})}>⏱ {props.turnLeft}s</div>
      )}
      {p.betThisRound > 0 && <div style={S.betChip}>{p.betThisRound.toLocaleString()}</div>}

      <div style={S.holeCards}>
        {(p.cards || []).map(function (cd, i) {
          /* 새 핸드마다 key가 바뀌어 딜링 애니메이션이 재생됨 */
          var dealDelay = ((props.dealOrder || 0) * 0.1 + i * 0.05);
          if (props.reveal && cd) {
            /* 쇼다운/올인 오픈 시엔 뒤집는 연출, 딜링 시엔 날아오는 연출 */
            var animName = r.revealCards ? "flipIn" : "dealIn";
            var animDelay = r.revealCards ? (i * 0.12) : dealDelay;
            return (
              <div key={r.handNumber + "-o-" + i}
                style={{ animation: animName + " 0.4s cubic-bezier(.2,.85,.35,1) both", animationDelay: animDelay + "s" }}>
                <Card card={cd} win={win} small={true} />
              </div>
            );
          }
          if (p.cards && p.cards.length) {
            return (
              <div key={r.handNumber + "-c-" + i}
                style={Object.assign({}, S.cardBackSm, {
                  animation: "dealIn 0.4s cubic-bezier(.2,.85,.35,1) both",
                  animationDelay: dealDelay + "s"
                })} />
            );
          }
          return null;
        })}
      </div>

      {/* [1] 본인 전용 실시간 족보 */}
      {props.privateLabel && <div style={S.privateHand}>{props.privateLabel}</div>}

      {handName && r.revealCards && <div style={S.handNameTxt}>{handName}</div>}

      {p.status === "allin" && <div style={S.allinLabel}>올인</div>}
    </div>
  );
}
